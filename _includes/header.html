<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
    <p class="site-tagline">{{ site.description | escape }}</p>

    <nav class="site-nav category-nav">
      <a class="nav-link {% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">전체</a>
      {% for cat in site.categories_nav %}
        <a class="nav-link {% if page.category == cat.slug %}active{% endif %}"
           href="{{ '/categories/' | append: cat.slug | append: '/' | relative_url }}">{{ cat.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
