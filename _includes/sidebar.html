<aside class="site-sidebar">
  <div class="sidebar-inner">
    <h2 class="sidebar-title">카테고리</h2>
    <ul class="cat-tree">
      <li class="cat-tree-item">
        <a class="cat-tree-link {% if page.url == '/' %}active{% endif %}"
           href="{{ '/' | relative_url }}">
          <span class="cat-tree-name">전체보기</span>
          <span class="cat-tree-count">{{ site.posts | size }}</span>
        </a>
      </li>
      {% for cat in site.categories_nav %}
        {% assign posts_in_cat = site.categories[cat.slug] %}
        <li class="cat-tree-item">
          <a class="cat-tree-link {% if page.category == cat.slug %}active{% endif %}"
             href="{{ '/categories/' | append: cat.slug | append: '/' | relative_url }}">
            <span class="cat-tree-name">{{ cat.name }}</span>
            <span class="cat-tree-count">{{ posts_in_cat | size }}</span>
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
</aside>
