title: joygram
description: AI와 자동화로 직접 만들며 익힌 것들을, 한 권의 책처럼 차근차근 풀어 씁니다.
author: joygram
baseurl: "/blog"
url: "https://joygram.github.io"
theme: minima

# 미래 날짜 글도 빌드에 포함(자동 발행은 항상 '오늘' 글을 올림)
future: true

permalink: /:categories/:year/:month/:day/:title.html

# DeukBlogger 자동 발행 대상 저장소.
# 글은 _posts/ 에 YYYY-MM-DD-slug.md (Jekyll 프론트매터) 형식으로 push 된다.
plugins:
  - jekyll-feed

# 블로그 카테고리 네비게이션 — 통상 블로그식 분류.
# slug 는 글 frontmatter 의 categories 값과 일치해야 한다.
categories_nav:
  - { slug: vibe-coding,    name: 바이브코딩 }
  - { slug: app-automation, name: 앱자동화 }
  - { slug: chatgpt-usage,  name: 챗지피티활용 }
  - { slug: ai-coding,      name: AI코딩 }
  - { slug: adhd,           name: ADHD생산성 }
  - { slug: education,      name: 교육 }
  - { slug: health,         name: 건강 }
  - { slug: realestate,     name: 부동산 }
  - { slug: stock,          name: 주식 }

minima:
  skin: classic
